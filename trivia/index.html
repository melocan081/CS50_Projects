<!DOCTYPE html>

<html lang="en">

    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            // TODO: Add code to check answers to questions
            document.addEventListener('DOMContentLoaded', function() {
                let correct = document.querySelector("#correct");


                correct.addEventListener("click", function() {
                    console.log("Correct button clicked");

                    correct.style.backgroundColor = "Green";
                    correct.parentElement.querySelector(".feedback").innerHTML = "Correct!";
                });


                let wrongOnes = document.querySelectorAll(".wrong")
                for (let i = 0; i < wrongOnes.length; i++) {
                    wrongOnes[i].addEventListener("click", function() {
                        wrongOnes[i].style.backgroundColor = "Red";
                        wrongOnes[i].parentElement.querySelector(".feedback").innerHTML = "Incorrect.";
                    });
                }


                document.querySelector("#check").addEventListener("click", function() {
                    let answer = document.querySelector("input");
                    if (answer.value == "Tralalero Tralala") {
                        answer.style.backgroundColor = "Green";
                        answer.parentElement.querySelector(".feedback").innerHTML = "Correct!";
                    }
                    else {
                        answer.style.backgroundColor = "Red";
                        answer.parentElement.querySelector(".feedback").innerHTML = "Incorrect.";

                    }
                });




            });
        </script>
    </head>

    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <!-- TODO: Add multiple choice question here -->
                <h3>The tallest mountain in the world, Mount Everest, is how many meters long?</h3>
                <button id="correct">8848m</button>
                <button class="wrong">5809m</button>
                <button class="wrong">9241m</button>
                <button class="wrong">7994m</button>
                <p class="feedback"></p>

            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <!-- TODO: Add free response question here -->
                <h3>What was the first Italian Brainrot to ever exist on the Net?</h3>
                <input placeholder="Answer here..." type="text"></input>
                <button id="check">Check</button>
                <p class="feedback"></p>


            </div>
        </div>
    </body>

</html>
